<!DOCTYPE html>
<html lang="es"> <!-- Define el idioma del documento como español -->
<head>
    <meta charset="UTF-8"> <!-- Codificación UTF-8 para caracteres especiales -->
    <title>Dashboard General Administrativo</title> <!-- Título de la pestaña del navegador -->

    <!-- Carga de Bootstrap para estilos y componentes responsivos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos de Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Librería Chart.js para gráficas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Estilos personalizados del proyecto -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body> <!-- Inicio del cuerpo del documento -->

<div class="container-fluid"> <!-- Contenedor fluido de Bootstrap -->
    <div class="row"> <!-- Fila principal del layout -->

        <!-- SIDEBAR IZQUIERDO DEL PANEL ADMIN -->
        <div class="col-md-3 col-lg-2 sidebar-admin p-3 d-flex flex-column"> <!-- Columna lateral -->
            
            <h4 class="text-center py-3 border-bottom"> <!-- Título del panel -->
                <i class="fa-solid fa-user-shield me-2"></i>Panel Admin
            </h4>

            <ul class="nav flex-column mt-3 gap-2"> <!-- Menú vertical -->

                <li class="nav-item">
                    <a href="{{ url_for('admin.dashboard') }}">
                        <i class="fa-solid fa-chart-pie me-2"></i>Estadísticas
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.usuarios') }}">
                        <i class="fa-solid fa-users me-2"></i>Usuarios
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.servicios') }}">
                        <i class="fa-solid fa-server me-2"></i>Servicios
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.problemas') }}">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>Problemas
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.ubicaciones') }}">
                        <i class="fa-solid fa-map-pin me-2"></i>Ubicaciones
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ url_for('admin.sugerencias') }}">
                        <i class="fa-solid fa-lightbulb me-2"></i>Sugerencias
                    </a>
                </li>

                <li class="nav-item mt-5">
                    <a href="{{ url_for('index') }}" class="text-warning">
                        <i class="fa-solid fa-arrow-left me-2"></i>Volver al Portal
                    </a>
                </li>

            </ul>
        </div>

        <!-- CONTENIDO PRINCIPAL DEL DASHBOARD -->
        <div class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            {% block admin_content %}{% endblock %} <!-- Bloque dinámico para cada vista admin -->
        </div>

    </div>
</div>

<!-- Scripts de Bootstrap (JS + Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
